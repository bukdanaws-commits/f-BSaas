services:
  - type: web
    name: eventify-api
    env: go
    region: singapore
    plan: starter
    buildCommand: go build -o main ./cmd/main.go
    startCommand: ./main
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: eventify-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MIDTRANS_MERCHANT_ID
        sync: false
      - key: MIDTRANS_SERVER_KEY
        sync: false
      - key: MIDTRANS_CLIENT_KEY
        sync: false
      - key: MIDTRANS_IS_SANDBOX
        value: true
      - key: FRONTEND_URL
        value: https://eventku.co.id

databases:
  - name: eventify-db
    databaseName: postgres
    user: postgres
